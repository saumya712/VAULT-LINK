version: '3.8'

services:

  # ── PostgreSQL ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: vaultlink-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: vaultlink
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Backend ────────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: vaultlink-backend
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/vaultlink?sslmode=disable
      PORT: :8080
      APP_URL: http://localhost:5173
      ENV: production
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # ── Frontend ───────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: vaultlink-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped

# ── Volumes ────────────────────────────────────────────────────────────────
volumes:
  postgres_data: